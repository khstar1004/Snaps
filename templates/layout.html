<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}SnapS{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">SnapS</div>
            <nav>
                <a href="{{ url_for('index') }}" {% if request.url.path == '/' %}class="active"{% endif %}>홈</a>
                <a href="{{ url_for('content_conversion') }}" {% if request.url.path == '/content-conversion' %}class="active"{% endif %}>콘텐츠 변환</a>
                <a href="{{ url_for('content_management') }}" {% if request.url.path == '/content-management' %}class="active"{% endif %}>콘텐츠 관리</a>
                <a href="{{ url_for('statistics') }}" {% if request.url.path == '/statistics' %}class="active"{% endif %}>통계 분석</a>
                <a href="{{ url_for('my_page') }}" {% if request.url.path == '/my-page' %}class="active"{% endif %}>마이페이지</a>
                {% if session and session.get('user_id') %}
                    <a href="{{ url_for('logout') }}">로그아웃</a>
                {% else %}
                    <a href="{{ url_for('login') }}">로그인</a>
                {% endif %}
            </nav>
        </div>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
